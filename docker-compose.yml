# Production config for the local n8n instance. Bind-mounts the existing
# Windows data directory (workflows, credentials, executions) so recreating
# the container - e.g. after a Docker Desktop reset - is a single
# `docker compose up -d` with zero data loss.
services:
  n8n:
    image: n8nio/n8n
    container_name: goofy_mcclintock
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - DB_TYPE=sqlite
      - N8N_RELEASE_TYPE=stable
    volumes:
      - C:\Users\kraemhel\.n8n:/home/node/.n8n
